name: Update CB Trending Feed

on:
  schedule:
    - cron: '30 * * * *' # Runs at the 30-minute mark of every hour
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        run: python CBSprayer.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add cb_trending_feed.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update CB feed" && git push)
