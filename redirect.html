<!DOCTYPE html>
<html>
<head>
    <title>Redirecting to Deal...</title>
    <style>body { font-family: sans-serif; text-align: center; padding-top: 50px; }</style>
    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const target = urlParams.get('target');
            if (target) {
                // Decode and jump to Amazon
                setTimeout(() => {
                    window.location.replace(decodeURIComponent(target));
                }, 500); 
            } else {
                window.location.replace("https://www.amazon.com");
            }
        }
    </script>
</head>
<body>
    <h2>🚀 Preparing your deal...</h2>
    <p>Connecting you to the Amazon Marketplace.</p>
</body>
</html>
